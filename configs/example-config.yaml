# Example configuration file for pentest-agent
# Copy this file and modify it for your specific testing needs

authentication:
  login_type: form  # Options: 'form' or 'sso'
  login_url: "https://example.com/login"
  credentials:
    username: "testuser"
    password: "testpassword"
    totp_secret: "JBSWY3DPEHPK3PXP"  # Optional TOTP secret for 2FA
  
  # Natural language instructions for login flow
  login_flow:
    - "Type $username into the email field"
    - "Type $password into the password field"
    - "Click the 'Sign In' button"
    - "Enter $totp in the verification code field"
    - "Click 'Verify'"
  
  success_condition:
    type: url_contains  # Options: 'url_contains' or 'element_present'
    value: "/dashboard"

# Multi-node LLM routing (optional - for 2 machines with local LM Studio)
# Remove this section to use single LLM_BASE_URL env var instead.
llm_nodes:
  - id: node1
    baseUrl: "http://192.168.1.10:1234/v1"   # machine 1 (i7-10th gen)
    apiKey: "lm-studio"
    model: "qwen2.5-7b-instruct-q4_k_m"
    agents:
      - pre-recon
      - recon
      - report
  - id: node2
    baseUrl: "http://192.168.1.20:1234/v1"   # machine 2 (i7-13th gen)
    apiKey: "lm-studio"
    model: "qwen2.5-14b-instruct-q4_k_m"
    agents:
      - injection-vuln
      - xss-vuln
      - auth-vuln
      - authz-vuln
      - ssrf-vuln
      - injection-exploit
      - xss-exploit
      - auth-exploit
      - authz-exploit
      - ssrf-exploit

rules:
  avoid:
    - description: "Do not test the marketing site subdomain"
      type: subdomain
      url_path: "www"
    
    - description: "Skip logout functionality"
      type: path
      url_path: "/logout"
    
    - description: "No DELETE operations on user API"
      type: path
      url_path: "/api/v1/users/*"
  
  focus:
    - description: "Prioritize beta admin panel subdomain"
      type: subdomain
      url_path: "beta-admin"
    
    - description: "Focus on user profile updates"
      type: path
      url_path: "/api/v2/user-profile"