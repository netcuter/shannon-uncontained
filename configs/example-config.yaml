# Example configuration file for pentest-agent
# Copy this file and modify it for your specific testing needs

authentication:
  login_type: form  # Options: 'form' or 'sso'
  login_url: "https://example.com/login"
  credentials:
    username: "testuser"
    password: "testpassword"
    totp_secret: "JBSWY3DPEHPK3PXP"  # Optional TOTP secret for 2FA
  
  # Natural language instructions for login flow
  login_flow:
    - "Type $username into the email field"
    - "Type $password into the password field"
    - "Click the 'Sign In' button"
    - "Enter $totp in the verification code field"
    - "Click 'Verify'"
  
  success_condition:
    type: url_contains  # Options: 'url_contains' or 'element_present'
    value: "/dashboard"

# Multi-node LLM routing (optional - for 2 machines with local LM Studio)
# Remove this section and set LLM_BASE_URL env var for single-node setup.
#
# Model selection rationale (tested, CPU-only, 16GB RAM):
#   node1 (i7-13th gen, stronger): qwen3-coder-30b-a3b-instruct
#     - MoE architecture (only 3B params active) → fast despite 30B total
#     - Best quality in tests: Prototype Pollution, SSRF, concrete exploits
#     - Used for high-stakes agents: recon synthesis, report generation
#   node2 (i7-10th gen): whiterabbitneo-2.5-qwen-2.5-coder-7b
#     - Security-focused fine-tune of Qwen2.5-Coder-7B
#     - Handles all vuln/exploit agents (parallel workload)
#     - pre-recon uses qwen2.5-1.5b-sft-lora-websecurity-v1 (24s, tiny, web-sec specialized)
llm_nodes:
  - id: node1
    baseUrl: "http://MACHINE1_IP:1234/v1"   # i7-13th gen
    apiKey: "YOUR_LMSTUDIO_KEY"
    model: "qwen3-coder-30b-a3b-instruct"
    agents:
      - recon
      - report
  - id: node2
    baseUrl: "http://MACHINE2_IP:1234/v1"   # i7-10th gen
    apiKey: "YOUR_LMSTUDIO_KEY"
    model: "whiterabbitneo-2.5-qwen-2.5-coder-7b"
    agents:
      - injection-vuln
      - xss-vuln
      - auth-vuln
      - authz-vuln
      - ssrf-vuln
      - injection-exploit
      - xss-exploit
      - auth-exploit
      - authz-exploit
      - ssrf-exploit
  - id: node2-fast
    baseUrl: "http://MACHINE2_IP:1234/v1"   # same machine, tiny model for pre-recon
    apiKey: "YOUR_LMSTUDIO_KEY"
    model: "qwen2.5-1.5b-sft-lora-websecurity-v1"
    agents:
      - pre-recon

rules:
  avoid:
    - description: "Do not test the marketing site subdomain"
      type: subdomain
      url_path: "www"
    
    - description: "Skip logout functionality"
      type: path
      url_path: "/logout"
    
    - description: "No DELETE operations on user API"
      type: path
      url_path: "/api/v1/users/*"
  
  focus:
    - description: "Prioritize beta admin panel subdomain"
      type: subdomain
      url_path: "beta-admin"
    
    - description: "Focus on user profile updates"
      type: path
      url_path: "/api/v2/user-profile"